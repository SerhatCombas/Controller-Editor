<!-- Fixed wall: port at (64,32) right -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- wall line -->
  <line x1="16" y1="8" x2="16" y2="56" stroke="currentColor" stroke-width="2"/>
  <!-- hatch lines -->
  <line x1="16" y1="12" x2="6" y2="22" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="20" x2="6" y2="30" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="28" x2="6" y2="38" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="36" x2="6" y2="46" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="44" x2="6" y2="54" stroke="currentColor" stroke-width="1.5"/>
  <!-- connection line -->
  <line x1="16" y1="32" x2="64" y2="32" stroke="currentColor" stroke-width="2"/>
  <text x="40" y="58" text-anchor="middle" font-size="8" font-family="sans-serif" fill="currentColor">{{name}}</text>
</svg>
