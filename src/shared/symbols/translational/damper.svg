<!-- Damper (dashpot): ports at (0,32) left, (64,32) right -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- left rod -->
  <line x1="0" y1="32" x2="24" y2="32" stroke="currentColor" stroke-width="2"/>
  <!-- piston head -->
  <line x1="24" y1="20" x2="24" y2="44" stroke="currentColor" stroke-width="2"/>
  <!-- cylinder body -->
  <rect x="28" y="20" width="20" height="24" stroke="currentColor" fill="none" stroke-width="2"/>
  <!-- right rod -->
  <line x1="48" y1="32" x2="64" y2="32" stroke="currentColor" stroke-width="2"/>
  <text x="36" y="10" text-anchor="middle" font-size="8" font-family="sans-serif" fill="currentColor">{{name}}</text>
  <text x="36" y="58" text-anchor="middle" font-size="7" font-family="sans-serif" fill="currentColor">{{d}}</text>
</svg>
