<!-- Force Source: ports at (0,32) left, (64,32) right -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- left connection -->
  <line x1="0" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="2"/>
  <!-- circle -->
  <circle cx="22" cy="32" r="10" stroke="currentColor" fill="none" stroke-width="2"/>
  <!-- arrow shaft -->
  <line x1="32" y1="32" x2="58" y2="32" stroke="currentColor" stroke-width="2"/>
  <!-- arrowhead -->
  <polyline points="52,26 58,32 52,38" stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round"/>
  <!-- right connection point at arrow tip -->
  <text x="32" y="10" text-anchor="middle" font-size="8" font-family="sans-serif" fill="currentColor">{{name}}</text>
  <text x="32" y="58" text-anchor="middle" font-size="7" font-family="sans-serif" fill="currentColor">{{F}}</text>
</svg>
