<!-- Mass: ports at (0,32) left, (64,32) right -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- connection lines -->
  <line x1="0" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="2"/>
  <line x1="52" y1="32" x2="64" y2="32" stroke="currentColor" stroke-width="2"/>
  <!-- mass block -->
  <rect x="12" y="16" width="40" height="32" stroke="currentColor" fill="currentColor" fill-opacity="0.15" stroke-width="2"/>
  <!-- label -->
  <text x="32" y="36" text-anchor="middle" font-size="12" font-family="sans-serif" fill="currentColor">{{m}}</text>
  <text x="32" y="10" text-anchor="middle" font-size="8" font-family="sans-serif" fill="currentColor">{{name}}</text>
</svg>
