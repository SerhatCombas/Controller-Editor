<!-- Voltage Source: ports at (0,32) left, (64,32) right -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <line x1="0" y1="32" x2="16" y2="32" stroke="currentColor" stroke-width="2"/>
  <circle cx="32" cy="32" r="16" stroke="currentColor" fill="none" stroke-width="2"/>
  <line x1="48" y1="32" x2="64" y2="32" stroke="currentColor" stroke-width="2"/>
  <!-- plus sign on left side -->
  <line x1="22" y1="32" x2="28" y2="32" stroke="currentColor" stroke-width="1.5"/>
  <line x1="25" y1="29" x2="25" y2="35" stroke="currentColor" stroke-width="1.5"/>
  <!-- minus sign on right side -->
  <line x1="36" y1="32" x2="42" y2="32" stroke="currentColor" stroke-width="1.5"/>
  <text x="32" y="10" text-anchor="middle" font-size="8" font-family="sans-serif" fill="currentColor">{{name}}</text>
  <text x="32" y="60" text-anchor="middle" font-size="7" font-family="sans-serif" fill="currentColor">{{V}}</text>
</svg>
